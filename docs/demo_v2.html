<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dory Memory Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: #0d1117;
  border-right: 1px solid #21262d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #21262d;
}
#sidebar-header h1 { font-size: 16px; font-weight: 700; color: #f0f6fc; letter-spacing: 0.3px; }
#sidebar-header p  { font-size: 11px; color: #484f58; margin-top: 2px; }

#stats {
  padding: 10px 16px;
  border-bottom: 1px solid #21262d;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.stat { text-align: center; }
.stat-val { font-size: 18px; font-weight: 700; color: #58a6ff; }
.stat-lbl { font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Query panel ── */
#query-panel {
  padding: 10px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
#query-panel-title {
  font-size: 10px; color: #484f58; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;
}
#query-input {
  background: #161b22;
  border: 1px solid #21262d;
  color: #c9d1d9;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  width: 100%;
  outline: none;
  margin-bottom: 6px;
}
#query-input:focus { border-color: #58a6ff; }
#query-input::placeholder { color: #30363d; }

#query-examples { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.query-chip {
  background: #161b22;
  border: 1px solid #21262d;
  color: #8b949e;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
}
.query-chip:hover { border-color: #58a6ff; color: #c9d1d9; }
.query-chip.active { border-color: #58a6ff; color: #58a6ff; background: #0d1f3c; }

#route-badge { display: none; margin-bottom: 6px; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
}
.badge-graph    { background: #0d1f3c; color: #58a6ff; border: 1px solid #1d4ed8; }
.badge-episodic { background: #0f2b0f; color: #4ade80; border: 1px solid #166534; }
.badge-hybrid   { background: #2d1a00; color: #fb923c; border: 1px solid #92400e; }

#reasoning-section { display: none; }
#reasoning-title {
  font-size: 10px; color: #484f58; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 8px;
}
.activated-item {
  display: flex; flex-direction: column; gap: 2px;
  background: #161b22; border-radius: 4px;
  padding: 5px 8px; margin-bottom: 3px;
  font-size: 11px; cursor: pointer; border: 1px solid transparent;
  transition: border-color 0.15s;
}
.activated-item:hover { border-color: #30363d; }
.activated-item-header { display: flex; justify-content: space-between; align-items: center; }
.activated-item-type { font-size: 10px; }
.activated-item-label { color: #c9d1d9; line-height: 1.3; }
.activation-bar-wrap { background: #0d1117; border-radius: 2px; height: 2px; margin-top: 3px; }
.activation-bar { height: 2px; border-radius: 2px; transition: width 0.4s ease; }

#clear-query {
  display: none; background: none; border: none;
  color: #484f58; font-size: 10px; cursor: pointer; padding: 2px 0;
}
#clear-query:hover { color: #8b949e; }

/* ── Legend ── */
#legend {
  padding: 10px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
#legend h3 { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.legend-item {
  display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
  font-size: 11px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
  color: #8b949e; transition: all 0.15s;
}
.legend-item:hover { color: #c9d1d9; }
.legend-item.dimmed { opacity: 0.3; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── Edge legend ── */
#edge-legend {
  padding: 8px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
#edge-legend h3 { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.edge-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; font-size: 10px; color: #484f58; }
.edge-swatch { width: 20px; height: 2px; border-radius: 1px; flex-shrink: 0; }
.edge-swatch.dashed {
  background: repeating-linear-gradient(90deg, #f85149 0px, #f85149 4px, transparent 4px, transparent 8px);
}

/* ── Zone controls ── */
#zone-controls {
  padding: 8px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
#zone-controls h3 { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.zone-btn {
  background: #161b22; border: 1px solid #21262d; color: #484f58;
  padding: 3px 8px; border-radius: 4px; font-size: 10px;
  cursor: pointer; margin-right: 4px; transition: all 0.15s;
}
.zone-btn.active { background: #0d1f3c; border-color: #1d4ed8; color: #58a6ff; }

/* ── Inspector (right panel) ── */
#inspector {
  width: 0; min-width: 0; overflow: hidden;
  background: #0d1117; border-left: 1px solid #21262d;
  transition: width 0.25s ease; flex-shrink: 0;
}
#inspector.open { width: 320px; min-width: 320px; }
#inspector-inner {
  width: 320px; height: 100vh; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
}
#inspector-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
#inspector-badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; flex: 1; }
#inspector-type-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; padding: 3px 10px; border-radius: 10px; border: 1px solid;
}
.core-badge {
  display: inline-block; background: #1c1400; border: 1px solid #bb8009;
  color: #d29922; font-size: 9px; padding: 1px 6px; border-radius: 10px;
}
.archived-badge {
  display: inline-block; background: #1c0000; border: 1px solid #f85149;
  color: #f85149; font-size: 9px; padding: 1px 6px; border-radius: 10px;
}
#inspector-close {
  background: none; border: none; color: #484f58; font-size: 16px;
  cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0;
}
#inspector-close:hover { color: #c9d1d9; }
#inspector-content-text {
  font-size: 13px; color: #e6edf3; line-height: 1.6;
  background: #161b22; padding: 10px 12px; border-radius: 6px;
  border: 1px solid #21262d; white-space: pre-wrap; word-break: break-word;
}
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.meta-item { display: flex; flex-direction: column; gap: 1px; }
.meta-key { font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; }
.meta-val { font-size: 12px; color: #58a6ff; font-family: monospace; }
.inspector-section-title {
  font-size: 9px; color: #484f58; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 5px;
}
.conn-item {
  display: flex; align-items: flex-start; gap: 8px;
  background: #161b22; border: 1px solid transparent; border-radius: 4px;
  padding: 6px 8px; margin-bottom: 3px; cursor: pointer; font-size: 11px;
  transition: border-color 0.15s;
}
.conn-item:hover { border-color: #30363d; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.conn-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.conn-edge-type { font-size: 9px; color: #484f58; }
.conn-label { color: #c9d1d9; word-break: break-word; }

/* ── Nav sections dimming on node select ── */
#nav-sections { transition: opacity 0.2s; }
#nav-sections.dimmed { opacity: 0.3; pointer-events: none; }

/* ── Graph area ── */
#graph-area { flex: 1; position: relative; overflow: hidden; }

#offline-notice {
  display: none; margin: 16px; padding: 14px 16px; border-radius: 10px;
  border: 1px solid #21262d; background: #161b22; color: #c9d1d9;
  font-size: 12px; line-height: 1.5;
}
#offline-notice strong { color: #f0f6fc; }
#offline-notice code { color: #58a6ff; }

#fallback-view {
  display: none; padding: 16px; overflow-y: auto; height: calc(100vh - 52px);
}
.fallback-section {
  margin-bottom: 18px; background: #161b22; border: 1px solid #21262d;
  border-radius: 10px; padding: 14px 16px;
}
.fallback-section h3 { font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.fallback-row { padding: 7px 0; border-top: 1px solid #161b22; font-size: 11px; line-height: 1.5; }
.fallback-row:first-child { border-top: none; padding-top: 0; }
.fallback-type { color: #58a6ff; font-size: 10px; }
.fallback-meta { color: #484f58; font-size: 10px; }

svg { width: 100%; height: 100%; }

.link { transition: stroke-opacity 0.2s; }
.node circle { cursor: pointer; }
.node.selected circle { filter: brightness(1.3); }

.node-label {
  font-size: 10px; fill: #8b949e; pointer-events: none; text-anchor: middle;
}
.node-label.hidden { display: none; }

.core-ring { fill: none; stroke: #d29922; stroke-width: 2px; pointer-events: none; }

.edge-label {
  font-size: 9px; fill: #484f58; pointer-events: none; text-anchor: middle;
}

#tooltip {
  position: absolute; background: #161b22; border: 1px solid #30363d;
  border-radius: 6px; padding: 7px 10px; font-size: 11px;
  pointer-events: none; opacity: 0; transition: opacity 0.1s;
  max-width: 220px; z-index: 100;
}
#tooltip .tt-type { color: #58a6ff; font-size: 9px; text-transform: uppercase; }
#tooltip .tt-content { color: #f0f6fc; margin-top: 2px; line-height: 1.4; }

#search-bar { position: absolute; top: 12px; right: 12px; z-index: 10; }
#search-input {
  background: #161b22; border: 1px solid #21262d;
  color: #c9d1d9; padding: 5px 10px; border-radius: 6px;
  font-size: 11px; width: 190px; outline: none;
}
#search-input:focus { border-color: #58a6ff; }
#search-input::placeholder { color: #30363d; }
</style>
</head>

  </div>
</div>

<div id="graph-area">
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search nodes…">

  <div id="offline-notice"></div>
  <div id="fallback-view"></div>
  <div id="tooltip">

    <div class="tt-content" id="tt-content"></div>

  <svg id="graph-svg"></svg>
</div>

    <div class="meta-grid" id="inspector-meta"></div>

      <div id="inspector-conn-list"></div>
    </div>
  </div>
</div>

"2026-03-04", "color": "#f87171", "opacity": 1.0, "superseded_at": null}, {"id": "db2bcfc1", "label": "Deep research March 2026: Agent memory landscap\u2026", "full": "Deep research March 2026: Agent memory landscape. Taxonomy: working/in-context, episodic, semantic, procedural. MemGPT/Letta: OS-inspired virtual context. Mastra Observational Memory: 94.87% LongMemEval, 4-10x token reduction via prompt caching. Zep: temporal knowledge graph (Graphiti). Mem0: vector+graph extraction, 20s write latency problem. Context rot real: degrades at 500-750 tokens, all 18 frontier models affected. Multi-agent: 36.9% failures from misalignment, 15x token overhead. Local stack: SQLite-vec+sqlite-lembed, LanceDB embedded. Letta filesystem 74% on LoCoMo beats Mem0 graph at 68.5%. MAGMA: multi-graph 45.5% reasoning gain 95% token reduction. Unsolved: memory interoperability, forgetting policy, write conflicts, extraction quality, privacy.", "type": "CONCEPT", "salience": 0.962, "is_core": true, "zone": "active", "tags": [], "activation_count": 38, "degree": 15, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "82b123f2", "label": "Agent memory taxonomy: Working (in-context), Ep\u2026", "full": "Agent memory taxonomy: Working (in-context), Episodic (past events/sessions), Semantic (general facts/preferences), Procedural (skills/how-to). LLMs have strong semantic memory in weights but zero episodic memory at inference time and fixed procedural memory. Episodic memory is the most underbuilt capability.", "type": "CONCEPT", "salience": 0.711, "is_core": true, "zone": "active", "tags": [], "activation_count": 36, "degree": 13, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "2a2daba9", "label": "Key agent memory papers: MemGPT/Letta (OS-inspi\u2026", "full": "Key agent memory papers: MemGPT/Letta (OS-inspired two-tier memory, arXiv 2310.08560), Zep/Graphiti (bi-temporal knowledge graph, arXiv 2501.13956), MAGMA (four orthogonal graphs: semantic/temporal/causal/entity - 45.5% better reasoning, 95% token reduction, arXiv 2601.03236), MemOS (memory as OS resource, MemCube abstraction, 159% temporal reasoning improvement, arXiv 2505.22101), Mastra Observational Memory (cacheable prefix approach, 4-10x token cost reduction, 94.87% LongMemEval with GPT-5-mini).", "type": "CONCEPT", "salience": 0.871, "is_core": true, "zone": "active", "tags": [], "activation_count": 34, "degree": 9, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "d153e7e5", "label": "Agent memory production gaps (completely unsolv\u2026", "full": "Agent memory production gaps (completely unsolved): 1) Principled forgetting/decay - agents accumulate stale conflicting memories indefinitely. 2) Multi-agent write conflict resolution - last-writer-wins is universal, CRDTs/event sourcing only in research. 3) Memory format portability/interoperability - no standard protocol. 4) Local-first integrated stack - fragmented tools. 5) Procedural memory (skill accumulation) - embryonic. 6) False memory from bad LLM extraction - no defense. 7) Privacy/adversarial memory injection - no production defense.", "type": "CONCEPT", "salience": 0.741, "is_core": true, "zone": "active", "tags": [], "activation_count": 34, "degree": 12, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "733d1af3", "label": "Commercial agent memory landscape: mem0 (30k st\u2026", "full": "Commercial agent memory landscape: mem0 (30k stars, cloud+OSS, no temporal reasoning, 20s write latency self-hosted), Zep/Graphiti (bi-temporal graph, Neo4j backend, enterprise-focused), Letta (full stateful runtime, MemGPT lineage, requires full adoption), Mastra (TypeScript-only, best benchmarks), ReMe/Alibaba (local-first, Apache 2.0, trending March 2026), MemOS (research->product, most theoretically complete). Gap: no Python-native Mastra-equivalent, no local-first integrated stack with principled forgetting.", "type": "CONCEPT", "salience": 0.84, "is_core": true, "zone": "active", "tags": [], "activation_count": 30, "degree": 11, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "8b184392", "label": "Context rot: Chroma Research found ALL 18 front\u2026", "full": "Context rot: Chroma Research found ALL 18 frontier models (Claude Opus 4, GPT-4.1, Gemini 2.5, Qwen3-235B) degrade with context length. Degradation starts at 500-750 tokens, substantial beyond 2500. Lost-in-middle effect. Implication: injecting large memory blocks can actively HURT agent performance vs no memory. Token cost at 100K context: /bin/zsh.25/call at GPT-4o prices = /day at 10k calls. Mastra's cacheable prefix approach is the best current solution to both problems.", "type": "CONCEPT", "salience": 0.749, "is_core": true, "zone": "active", "tags": [], "activation_count": 30, "degree": 6, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "3f73f6f2", "label": "Adding REST endpoint for menu data to AllergyFind", "full": "Adding REST endpoint for menu data to AllergyFind", "type": "EVENT", "salience": 0.52, "is_core": true, "zone": "active", "tags": ["AllergyFind", "API"], "activation_count": 20, "degree": 8, "created_at": "2026-03-04", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "561fac77", "label": "Menu allergen data API endpoint", "full": "Menu allergen data API endpoint", "type": "CONCEPT", "salience": 0.634, "is_core": true, "zone": "active", "tags": ["API", "allergen"], "activation_count": 29, "degree": 7, "created_at": "2026-03-04", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "f200a778", "label": "Prefers FastAPI for REST endpoints", "full": "Prefers FastAPI for REST endpoints", "type": "PREFERENCE", "salience": 0.616, "is_core": true, "zone": "active", "tags": ["FastAPI"], "activation_count": 19, "degree": 5, "c r)", "type": "PREFERENCE", "salience": 0.665, "is_core": true, "zone": "active", "tags": ["performance", "apple-silicon"], "activation_count": 36, "degree": 2, "created_at": "2026-03-15", "color": "#fb923c", "opacity": 1.0, "superseded_at": null}, {"id": "24a746d2", "label": "Michael has ~$11 remaining in Anthropic API cre\u2026", "full": "Michael has ~$11 remaining in Anthropic API credits as of 2026-03-16. Full 500-question LongMemEval run with Sonnet extraction costs ~$25-40 (not feasible). Spot checks with Sonnet (~50 questions) cost ~$2-3. Full run with Haiku costs ~$5-8.", "type": "PREFERENCE", "salience": 0.687, "is_core": true, "zone": "active", "tags": [], "activation_count": 25, "degree": 10, "created_at": "2026-03-17", "color": "#fb923c", "opacity": 1.0, "superseded_at": "2026-03-27T07:25:58.563817+00:00"}, {"id": "eb67c2b2", "label": "March 2026 agent memory systems deep research: \u2026", "full": "March 2026 agent memory systems deep research: Mastra 22.1k stars TypeScript (99.3%), dual Apache2/Enterprise license, observational memory with Observer+Reflector agents, 94.87% LongMemEval GPT-5-mini, 5-40x compression, 4-10x token cost reduction via prompt caching, no vector/graph DB needed. Dependencies: 40+ LLM providers, pnpm+Turbo monorepo, Vitest, @mastra/pg/@mastra/libsql/@mastra/mongodb adapters. Threshold: 30k tokens (Observer), 40k tokens (Reflector). Benchmark: single-session 94.87%, multi-session 87.2%.", "type": "CONCEPT", "salience": 0.813, "is_core": true, "zone": "active", "tags": [], "activation_count": 23, "degree": 12, "created_at": "2026-03-17", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "1b68dc66", "label": "Zep/Graphiti 23.8k stars, Python (3.10+), Apach\u2026", "full": "Zep/Graphiti 23.8k stars, Python (3.10+), Apache 2.0 license. Bi-temporal knowledge graph: tracks when facts occurred (t_occurred) and ingested (t_ingested), edges have validity intervals. Core modules: graphiti_core, FastAPI server, MCP server. Graph backends: Neo4j (5.26+), FalkorDB 1.1.2, Kuzu 0.11.2, Amazon Neptune. Hybrid retrieval: semantic embeddings + BM25 full-text + graph traversal (BFS), no LLM calls during retrieval. Latency: P95 300ms. Performance: DMR 94.8% vs MemGPT 93.4%, LongMemEval +18.5%, 90% faster than baseline. Paper arXiv 2501.13956 by Preston Rasmussen et al, CC BY-NC-SA.", "type": "CONCEPT", "salience": 0.747, "is_core": true, "zone": "active", "tags": [], "activation_count": 24, "degree": 6, "created_at": "2026-03-17", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "a0911b9a", "label": "Mem0 50.1k stars, Python 63.7% + TypeScript 24.\u2026", "full": "Mem0 50.1k stars, Python 63.7% + TypeScript 24.1%, Apache 2.0 OSS + cloud managed. Three-tier: client, core, storage backends. Memory pipeline: LLM extraction \u2192 similarity search \u2192 conflict resolution \u2192 embedding \u2192 concurrent writes to vector+graph+SQLite. Vector stores: 22+ (Qdrant, Pinecone, ChromaDB, PGVector, Milvus, Weaviate, FAISS, Redis, Elasticsearch). Graph stores: 5+ (Neo4j, Memgraph, Kuzu, Neptune, FalkorDB). Dependencies: openai, pydantic, qdrant-client, sqlalchemy, LangGraph, CrewAI integrations. Performance: +26% LOCOMO benchmark, 91% faster than full-context, 90% lower tokens. Write latency: sub-second median (0.71s), configurable graph enable/disable per request to optimize latency.", "type": "CONCEPT", "salience": 0.729, "is_core": true, "zone": "active", "tags": [], "activation_count": 22, "degree": 5, "created_at": "2026-03-17", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "15294244", "label": "Dory repository audit completed 2026-03-17: str\u2026", "full": "Dory repository audit completed 2026-03-17: structure verified, all imports working, 175 tests passing, no critical issues found. Identified one concern: .env file with API key exists in repo but is properly gitignored and not tracked.", "type": "EVENT", "salience": 0.598, "is_core": false, "zone": "active", "tags": [], "activation_count": 22, "degree": 10, "created_at": "2026-03-17", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "13ab5047", "label": "Dory LongMemEval benchmark session (2026-03-18)\u2026", "full": "Dory LongMemEval benchmark session (2026-03-18): Starting score 66.8% (334/500). Implemented 5 fixes: (1) question_date injection into answering prompt, (2) expanded _TEMPORAL_RE to catch relative time patterns like \"2 weeks ago\"/\"last Saturday\", (3) aggregation-before-temporal routing priority, (4) session_date threading through Observer/Summarizer for EVENT date resolution, (5) dedicated _ANSWER_PROMPT_PREFERENCE for preference questions. Spot check spot_v4 (40 questions) showed 15 fixes, 4 regressions. Applied SESSION-after-semantic fix in _aggregation_context (session.py line 144) \u2014 SESSION memories now appear AFTER the semantic block to prevent anchoring on incomplete counts. This fix not yet validated. Next step: validate SESSION ordering fix with micro spot check, then decide on full 500-question run. Projected score: ~73-76%.", "type": "EVENT", "salience": 0.594, "is_core": false, "zone": "active", "tags": [], "activation_count": 21, "degree": 13, "created_at": "2026-03-18", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "79a894e6", "label": "Dory benchmark critical bug found (2026-03-18):\u2026", "full": "Dory benchmark critical bug found (2026-03-18): In _aggregation_context (dory/session.py), putting SESSION memories BEFORE the semantic block causes the model to anchor on incomplete counts. For counting questions like \"how many plants did I acquire\" where SESSION summaries only mention 2 items but there are 3 EVENT nodes, the model says 2 instead of 3. Fix: SESSION memories must come AFTER the semantic block. Fix applied at line 144 of session.py.", "type": "CONCEPT", "salience": 0.63, "is_core": false, "zone": "active", "tags": [], "activation_count": 20, "degree": 12, "created_at": "2026-03-18", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "a39d86f8", "label": "Dory benchmark files as of 2026-03-18: benchmar\u2026", "full": "Dory benchmark files as of 2026-03-18: benchmarks/spot_v4.json (40-question spot check), benchmarks/predictions_spot_v4.jsonl (predictions), benchmarks/predictions_spot_v4.jsonl.eval-results-claude-haiku-4-5-20251001 (eval). benchmarks/spot_micro.json (10-question regression check, built to validate SESSION ordering fix). Full run predictions at benchmarks/predictions_sonnet_full.jsonl, eval at benchmarks/predictions_sonnet_full.jsonl.eval-results-claude-haiku-4-5-20251001. Always pass --api-key explicitly to longmemeval.py (env var ANTHROPIC_API_KEY not auto-read by the script).", "type": "ENTITY", "salience": 0.599, "is_core": false, "zone": "active", "tags": [], "activation_count": 22, "degree": 14, "created_at": "2026-03-18", "color": "#58a6ff", "opacity": 1.0, "superseded_at": null}, {"id": "d7432bb0", "label": "Dory v0.2 benchmark results (2026-03-18): spot_\u2026", "full": "Dory v0.2 benchmark results (2026-03-18): spot_v4 (40q) scored 60.0% (24/40) vs v0.1 baseline of 47.5% (19/40). Net +12.5pp. By type: temporal-reasoning +20pp (53%\u219273%), multi-session +15pp (54%\u219269%), preference flat (33%\u219233%). 8 fixed, 3 regressions (all borderline evaluator noise). SessionSummary + salient_counts + retrieval fusion working as designed. Full 500q run pending \u2014 would cost ~$10-16 with extra summarize_session() calls, tight against $11 credit balance.", "type": "EVENT", "salience": 0.588, "is_core": false, "zone": "active", "tags": [], "activation_count": 18, "degree": 12, "created_at": "2026-03-18", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "d5e1e2a1", "label": "Dory repository audit completed 2026-03-21: Rep\u2026", "full": "Dory repository audit completed 2026-03-21: Repository is well-organized and mature. All documented features are present and functional. No critical issues found. .env file exists with API keys but is properly gitignored. Database files (engram.db, demo_*.db) are present and tracked. Benchmarks directory contains extensive evaluation results from v0.1-v0.3 progression. Code quality is high with no TODOs/FIXMEs found in core modules. Pyproject.toml version correctly set to 0.3.3. All imports are consistent. Test suite covers 14 test files. Some __pycache__ and .pyc files present from recent Python 3.13-3.14 runs.", "type": "EVENT", "salience": 0.56, "is_core": false, "zone": "active", "tags": [], "activation_count": 15, "degree": 5, "created_at": "2026-03-22", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "41475305", "label": "Dory v0.3.5 preference recall fix implemented (\u2026", "full": "Dory v0.3.5 preference recall fix implemented (2026-03-22): broadened _PREFERENCE_RE in dory/session.py to match generic question phrasing (\"any advice on\", \"can you suggest\", \"any tips\", \"what should I\", \"what would you recommend\"). Added _preference_context() function that surfaces ALL PREFERENCE nodes first (sorted by salience, regardless of activation), then FTS-expanded semantic nodes, then full SESSION history. Routing updated: when _PREFERENCE_RE matches and route==hybrid, calls _preference_context() instead of _hybrid_context(). Version bumped to 0.3.5, CHANGELOG updated. NOT yet pushed to GitHub or PyPI.", "type": "EVENT", "salience": 0.561, "is_core": false, "zone": "active", "tags": [], "activation_count": 15, "degree": 11, "created_at": "2026-03-22", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "9d9d42d5", "label": "Dory preference recall validation status (2026-\u2026", "full": "Dory preference recall validation status (2026-03-22): spot_v5 benchmark run completed (40q, 0 errors). Both spot_v5 preference questions now produce correct personalized answers. BUT: old v3 predictions also produced good answers for those 2 questions \u2014 they were likely already ds at 3, moderate (0.85+) at 2, weak at 1. (4) distinct_sessions field on Node \u2014 salience now weights cross-session persistence: reinforcement = log(activation_count) * (0.5 + 0.5 * log(distinct_sessions)). (5) Archived node isolation \u2014 find_seeds(), spread(), serialize() in activation.py now filter zone != active. (6) Reflector behavioral synthesis disabled \u2014 _synthesize_behavioral_preferences() returns 0, was generating keyword-noise PREFERENCE nodes.", "type": "EVENT", "salience": 0.391, "is_core": false, "zone": "active", "tags": [], "activation_count": 9, "degree": 7, "created_at": "2026-03-28", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "04839ab5", "label": "Dory v0.5.0 temporal spot check result (2026-03\u2026", "full": "Dory v0.5.0 temporal spot check result (2026-03-28): 90.0% on temporal-reasoning category (27/30 questions). Extractor: Haiku via Anthropic API. Answerer: claude-code-mcp (subscription). 3 failures were all retrieval/coverage gaps, not date-anchoring bugs. Previous v0.4.0 temporal score was 72.2% on full 500q run. evaluate_claude.py now exists in benchmarks/ as a Claude-as-judge evaluator (replaces GPT-4o judge, no OpenAI key needed).", "type": "EVENT", "salience": 0.392, "is_core": false, "zone": "active", "tags": [], "activation_count": 9, "degree": 9, "created_at": "2026-03-28", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "18736053", "label": "Dory benchmark operational note: PyPI token in \u2026", "full": "Dory benchmark operational note: PyPI token in .env has trailing newline \u2014 must use tr -d '[:space:]' when reading with grep/cut, or twine upload fails with 403. Also: ANTHROPIC_API_KEY must be exported (not just set as inline env prefix) before passing as --api-key arg, otherwise shell expansion gives empty string.", "type": "CONCEPT", "salience": 0.391, "is_core": false, "zone": "active", "tags": [], "activation_count": 9, "degree": 7, "created_at": "2026-03-28", "colo e", "tags": [], "activation_count": 4, "degree": 6, "created_at": "2026-04-05", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "a6838a13", "label": "Dory v0.8.0 gameplan (decided 2026-04-05): (1) \u2026", "full": "Dory v0.8.0 gameplan (decided 2026-04-05): (1) Add WORKING node type \u2014 ephemeral session-scoped facts seeded at activation_count=2 to clear salience floor, auto-archived after consolidation if not reinforced. Formalizes working memory tier. (2) Temporal context chronological ordering \u2014 sort _temporal_context by event_date metadata, not activation level. (3) Rename flush() to consolidate() as primary name. (4) Keep supersedes_hint field in Observer schema. Then run full 500q with Sonnet for both extraction AND answering (~$38), target \u226590% for v1.0 tag.", "type": "CONCEPT", "salience": 0.339, "is_core": false, "zone": "active", "tags": [], "activation_count": 3, "degree": 5, "created_at": "2026-04-05", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "e7d48244", "label": "Dory v2.0 architectural direction (identified 2\u2026", "full": "Dory v2.0 architectural direction (identified 2026-04-05): Current retrieval is too heuristic \u2014 regex routing (_TEMPORAL_RE, _PREFERENCE_RE etc), hard thresholds (salience floor 0.1, supersession 0.45), manual max_nodes per context type, node type proliferation. Each heuristic was added to fix a specific benchmark failure and they interact unpredictably. The principled fix: unified retrieval path \u2014 spreading activation \u2192 top-k nodes \u2192 single LLM reasoning step, no branching on query type. Graph structure (SUPERSEDES edges, node types, metadata) becomes the signal instead of code-path switching. Mastra achieves 94.87% with this approach. Cost argument for heuristics is weak now that Haiku is cheap.", "type": "BELIEF", "salience": 0.339, "is_core": false, "zone": "active", "tags": [], "activation_count": 5, "degree": 7, "created_at": "2026-04-05", "color": "#f87171", "opacity": 1.0, "superseded_at": null}, {"id": "8501b14d", "label": "Dory preference category regression finding (20\u2026", "full": "Dory preference category regression finding (2026-04-05): v0.7 preference score 56.7% vs v0.6 70.0%. Root cause: salience floor (0.1) filters single-session PREFERENCE nodes (activation_count=1 \u2192 salience=0). Tried PREFERENCE node floor exemption \u2014 net +1 (17\u219218/30) with 7 gains and 6 regressions, a wash. Regressions appear to be evaluator noise. Real fix is WORKING node type (seeds at activation_count=2, clears floor) + better extraction. Preference gap is also partly Observer extraction quality \u2014 implicit preferences not reliably extracted by Haiku.", "type": "CONCEPT", "salience": 0.339, "is_core": false, "zone": "active", "tags": [], "activation_count": 4, "degree": 5, "created_at": "2026-04-05", "color": "#c084fc", "opacity": 1.0, "superseded_at": null}, {"id": "ff2cbf0e", "label": "v0.8 Sonnet full run result (2026-04-05): 80.6%\u2026", "full": "v0.8 Sonnet full run result (2026-04-05): 80.6% (403/500) \u2014 regression from v0.7's 84.2%. Two causes: (1) Switching answer backend from claude-code-mcp (agentic, can re-query Dory) to Anthropic API (static one-shot context) lost multi-query capability \u2014 drove knowledge-update -14pp, multi-session -10.5pp. (2) Sonnet extraction disrupted supersession chains vs Haiku extraction. BUT: temporal-reasoning jumped 75.2%\u219284.2% (+16 questions) confirming Sonnet extracts dates reliably. Key lesson: never change extractor AND answering backend in same run. Next run: Sonnet extraction + claude-code-mcp answering (~$25-30).", "type": "EVENT", "salience": 0.339, "is_core": false, "zone": "active", "tags": [], "activation_count": 5, "degree": 7, "created_at": "2026-04-06", "color": "#4ade80", "opacity": 1.0, "superseded_at": null}, {"id": "188c78ab", "label": "Critical finding (2026-04-05): claude-code-mcp \u2026", "full": "Critical finding (2026-04-05): c   notice.innerHTML = "<strong>Local-only mode</strong><br>Regenerate with <code>allow_remote_js=True</code> for the interactive graph.";

  const fallback = document.getElementById("fallback-view");
  fallback.style.display = "block";
  const nodeRows = RAW_DATA.nodes.map(n => `
    <div class="fallback-row">
      <div class="fallback-type">${escapeHtml(n.type)}${n.is_core?" [CORE]":""}</div>
      <div>${escapeHtml(n.full)}</div>
      <div class="fallback-meta">zone=${escapeHtml(n.zone)} · salience=${escapeHtml(n.salience)} · deg=${escapeHtml(n.degree)}</div>
    </div>`).join("");
  fallback.innerHTML = `<div class="fallback-section"><h3>Nodes (${RAW_DATA.nodes.length})</h3>${nodeRows}</div>`;
}

if (!window.d3) {
  document.getElementById("s-nodes").textContent    = RAW_STATS.nodes      ?? 0;
  document.getElementById("s-edges").textContent    = RAW_STATS.edges      ?? 0;
  document.getElementById("s-core").textContent     = RAW_STATS.core_nodes ?? 0;
  document.getElementById("s-archived").textContent = RAW_STATS.archived   ?? 0;
  renderFallbackView();
} else {

document.getElementById("s-nodes").textContent    = RAW_STATS.nodes      ?? 0;
document.getElementById("s-edges").textContent    = RAW_STATS.edges      ?? 0;
document.getElementById("s-core").textContent     = RAW_STATS.core_nodes ?? 0;
document.getElementById("s-archived").textContent = RAW_STATS.archived   ?? 0;

// ── State ──
let activeZones  = new Set(["active", "archived"]);
let hiddenTypes  = new Set();
let selectedNode = null;
let activeQuery  = null;

// ── Compute top-N nodes by degree for always-on labels ──
const TOP_LABEL_COUNT = 8;
const sortedByDegree = [...RAW_DATA.nodes].sort((a,b) => b.degree - a.degree);
const topLabelIds = new Set(sortedByDegree.slice(0, TOP_LABEL_COUNT).map(n => n.id));

// ── Query chips ──
const examplesEl = document.getElementById("query-examples");
DEMO_QUERIES.forEach((q, i) => {
  const chip = document.createElement("button");
  chip.className = "query-chip";
  chip.textContent = q.text;
  chip.onclick = () => runQuery(i);
  examplesEl.appendChild(chip);
});

document.getElementById("query-input").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const text = e.target.value.trim();
  if (!text) return;
  const idx = DEMO_QUERIES.findIndex(q =>
    q.text.toLowerCase().includes(text.toLowerCase()) ||
    text.toLowerCase().includes(q.text.toLowerCase().split(" ")[0])
  );
  if (idx >= 0) runQuery(idx);
});

// ── SVG setup ──
const svg    = d3.select("#graph-svg");
const width  = () => document.getElementById("graph-area").clientWidth;
const height = () => document.getElementById("graph-area").clientHeight;
const container = svg.append("g");

svg.call(
  d3.zoom().scaleExtent([0.05, 5])
    .on("zoom", event => container.attr("transform", event.transform))
);

// Arrowhead
svg.append("defs").selectAll("marker")
  .data(["default", "supersedes", "temporal"])
  .join("marker")
  .attr("id", d => `arrow-${d}`)
  .attr("viewBox", "0 -4 8 8")
  .attr("refX", 22).attr("refY", 0)
  .attr("markerWidth", 5).attr("markerHeight", 5)
  .attr("orient", "auto")
  .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", d => d === "supersedes" ? "#f85149" : d === "temporal" ? "#d29922" : "#30363d");

// ── Node sizing ──
function nodeRadius(d) {
  const r = 5 + d.degree * 1.8 + d.salience * 8;
  return Math.max(5, Math.min(28, r));
}

// ── Visible data ──
function visibleData() {
  const nodes = RAW_DATA.nodes.filter(n => activeZones.has(n.zone) && !hiddenTypes.has(n.type));
  const nodeIds = new Set(nodes.map(n => n.id));
  const links = RAW_DATA.links.filter(l =>
    nodeIds.has(l.source.id ?? l.source) && nodeIds.has(l.target.id ?? l.target)
  );
  return { nodes, links };
}

// ── Main build ──
let simulation = null;
let linkSel, nodeGroupSel, labelSel, coreRingSel, edgeLabelSel;

function buildGraph() {
  container.selectAll("*").remove();
  const { nodes, links } = visibleData();
  const nodesCopy = nodes.map(d => ({ ...d }));
  const nodeMap   = new Map(nodesCopy.map(d => [d.id, d]));
  const linksCopy = links.map(l => ({
    ...l,
    source: nodeMap.get(l.source.id ?? l.source) ?? l.source,
    target: nodeMap.get(l.target.id ?? l.target) ?? l.target,
  }));

  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodesCopy)
    .force("link",    d3.forceLink(linksCopy).id(d => d.id).distance(d => 60 + (1 - d.weight) * 50).strength(0.7))
    .force("charge",  d3.forceManyBody().strength(d => -200 - d.degree * 30 - d.salience * 150))
    .force("x",       d3.forceX(width()  / 2).strength(0.05))
    .force("y",       d3.forceY(height() / 2).strength(0.05))
    .force("collide", d3.forceCollide(d => nodeRadius(d) + 6))
    .alphaDecay(0.010)
    .velocityDecay(0.38);

  // ── Links ──
  linkSel = container.append("g").selectAll("line")
    .data(linksCopy).join("line")
    .attr("class", "link")
    .attr("stroke",       d => d.color)
    .attr("stroke-width", d => d.type === "SUPERSEDES" ? 1.5 : Math.max(0.8, d.weight * 2))
    .attr("stroke-dasharray", d => d.type === "SUPERSEDES" ? "5,3" : null)
    .attr("stroke-opacity", d => d.base_opacity)
    .attr("marker-end", d =>
      d.type === "SUPERSEDES" ? "url(#arrow-supersedes)" :
      d.type.startsWith("TEMPORALLY") ? "url(#arrow-temporal)" :
      "url(#arrow-default)"
    );

  // ── Edge labels (hover) ──
  edgeLabelSel = container.append("g").selectAll("text")
    .data(linksCopy).join("text")
    .attr("class", "edge-label")
    .text(d => d.type)
    .style("display", "none");

  // ── Nodes ──
  nodeGroupSel = container.append("g").selectAll("g")
    .data(nodesCopy).join("g")
    .attr("class", "node")
    .call(
      d3.drag()
        .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag",  (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on("end",   (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  nodeGroupSel.append("circle")
    .attr("r",    d => nodeRadius(d))
    .attr("fill", d => d.zone === "archived" ? "#1c1c1c" : d.color)
    .attr("fill-opacity", d => d.opacity)
    .attr("stroke", d => d.zone === "archived" ? "#f8514966" : "none")
    .attr("stroke-width", d => d.zone === "archived" ? 1.5 : 0)
    .attr("stroke-dasharray", d => d.zone === "archived" ? "3,2" : null);

  // Core ring
  coreRingSel = nodeGroupSel.filter(d => d.is_core)
    .append("circle")
    .attr("class", "core-ring")
    .attr("r", d => nodeRadius(d) + 4);

  // ── Labels — only top-N + hovered + selected shown by default ──
  labelSel = nodeGroupSel.append("text")
    .attr("class", "node-label")
    .attr("dy", d => nodeRadius(d) + 11)
    .text(d => d.label.length > 22 ? d.label.slice(0, 20) + "…" : d.label)
    .attr("opacity", d => topLabelIds.has(d.id) ? 0.7 : 0);

  // ── Tooltip + interactions ──
  const tooltip = document.getElementById("tooltip");
  nodeGroupSel
    .on("mouseover", (event, d) => {
      // Show label on hover
      d3.select(event.currentTarget).select(".node-label").attr("opacity", 1);
      document.getElementById("tt-type").textContent =
        d.type + (d.is_core ? " ★" : "") + (d.zone === "archived" ? " ⚠" : "");
      document.getElementById("tt-content").textContent = d.label;
      tooltip.style.opacity = "1";
    })
    .on("mousemove", event => {
      tooltip.style.left = (event.offsetX + 14) + "px";
      tooltip.style.top  = (event.offsetY - 8)  + "px";
    })
    .on("mouseout", (event, d) => {
      if (selectedNode !== d.id && !topLabelIds.has(d.id)) {
        d3.select(event.currentTarget).select(".node-label").attr("opacity", 0);
      }
      tooltip.style.opacity = "0";
    })
    .on("click", (event, d) => {
      event.stopPropagation();
      selectNode(d, nodeGroupSel, linksCopy, nodeMap);
    });

  // Edge hover — show label
  linkSel
    .on("mouseover", function(event, d) {
      d3.select(this).attr("stroke-opacity", Math.min(1, d.base_opacity + 0.4));
      const idx = linksCopy.indexOf(d);
      edgeLabelSel.filter((_,i) => i === idx).style("display", null);
    })
    .on("mouseout", function(event, d) {
      if (activeQuery === null && selectedNode === null) {
        d3.select(this).attr("stroke-opacity", d.base_opacity);
      }
      edgeLabelSel.style("display", "none");
    });

  svg.on("click", () => clearSelection());

  simulation.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    edgeLabelSel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    nodeGroupSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  simulation.on("end", () => fitToView(nodesCopy));

  if (activeQuery !== null) applyQueryHighlight(activeQuery);
}

function fitToView(nodes) {
  if (!nodes || !nodes.length) return;
  const pad = 80;
  const xs = nodes.map(d => d.x).filter(v => v != null);
  const ys = nodes.map(d => d.y).filter(v => v != null);
  if (!xs.length) return;
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const w = width(), h = height();
  const scale = Math.min(0.92, Math.min(w / (x1 - x0 + pad * 2), h / (y1 - y0 + pad * 2)));
  const tx = w / 2 - scale * (x0 + x1) / 2;
  const ty = h / 2 - scale * (y0 + y1) / 2;
  svg.transition().duration(800).call(
    d3.zoom().transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ── Query mode ──
function runQuery(idx) {
  activeQuery = idx;
  const q = DEMO_QUERIES[idx];
  document.querySelectorAll(".query-chip").forEach((c, i) => c.classList.toggle("active", i === idx));
  document.getElementById("query-input").value = q.text;

  const badgeEl = document.getElementById("route-badge");
  badgeEl.style.display = "block";
  badgeEl.innerHTML = `Route: <span class="badge badge-${q.route}">${q.route}</span>`;

  // Rank-decay the activation scores for visual differentiation
  const entries = Object.entries(q.activated).sort((a,b) => b[1] - a[1]);
  const ranked  = {};
  entries.forEach(([nid, _], i) => {
    ranked[nid] = Math.max(0.2, 1.0 - i * 0.042);
  });

  const reasoningEl = document.getElementById("reasoning-section");
  const listEl = document.getElementById("activation-list");
  reasoningEl.style.display = "block";
  listEl.innerHTML = entries.slice(0, 8).map(([nid]) => {
    const node  = RAW_DATA.nodes.find(n => n.id === nid);
    if (!node) return "";
    const score = ranked[nid];
    const pct   = Math.round(score * 100);
    return `<div class="activated-item" onclick="window.highlightById('${nid}')">
      <div class="activated-item-header">
        <span class="activated-item-type" style="color:${node.color}">${node.type}</span>
        <span style="color:#8b949e;font-size:10px">${pct}%</span>
      </div>
      <span class="activated-item-label">${node.label}</span>
      <div class="activation-bar-wrap">
        <div class="activation-bar" style="width:${pct}%;background:${node.color}"></div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("clear-query").style.display = "block";
  applyQueryHighlight(idx, ranked);
}

function applyQueryHighlight(idx, ranked) {
  const q = DEMO_QUERIES[idx];
  if (!ranked) {
    const entries = Object.entries(q.activated).sort((a,b) => b[1] - a[1]);
    ranked = {};
    entries.forEach(([nid,_], i) => { ranked[nid] = Math.max(0.2, 1.0 - i * 0.042); });
  }

  // Nodes — glow activated, dim everything else hard
  nodeGroupSel.each(function(d) {
    const score  = ranked[d.id] || 0;
    const circle = d3.select(this).select("circle");
    const label  = d3.select(this).select(".node-label");
    if (score > 0) {
      circle
        .attr("fill-opacity", d.zone === "archived" ? 0.5 : Math.max(0.7, score))
        .style("filter", `drop-shadow(0 0 ${Math.round(5 + score * 12)}px ${d.color}cc)`);
      label.attr("opacity", score > 0.5 ? 1 : 0.6);
    } else {
      circle.attr("fill-opacity", d.opacity * 0.06).style("filter", null);
      label.attr("opacity", 0);
    }
  });

  // Edges — dim everything except paths between activated nodes
  if (linkSel) {
    linkSel.attr("stroke-opacity", l => {
      const s = l.source.id ?? l.source;
      const t = l.target.id ?? l.target;
      return (ranked[s] > 0 && ranked[t] > 0)
        ? Math.max(l.base_opacity, 0.7)
        : 0.03;
    });
  }
}

function clearQuery() {
  activeQuery = null;
  document.querySelectorAll(".query-chip").forEach(c => c.classList.remove("active"));
  document.getElementById("query-input").value = "";
  document.getElementById("route-badge").style.display = "none";
  document.getElementById("reasoning-section").style.display = "none";
  document.getElementById("clear-query").style.display = "none";

  nodeGroupSel.each(function(d) {
    d3.select(this).select("circle").attr("fill-opacity", d.opacity).style("filter", null);
    d3.select(this).select(".node-label").attr("opacity", topLabelIds.has(d.id) ? 0.7 : 0);
  });
  if (linkSel) linkSel.attr("stroke-opacity", d => d.base_opacity);
}

// ── Node selection / focus mode ──
function selectNode(d, nodeGroup, linksCopy, nodeMap) {
  selectedNode = d.id;
  nodeGroup.classed("selected", n => n.id === d.id);

  const connectedIds = new Set([d.id]);
  const connectedLinks = linksCopy.filter(l => {
    const s = l.source.id ?? l.source;
    const t = l.target.id ?? l.target;
    if (s === d.id || t === d.id) { connectedIds.add(s); connectedIds.add(t); return true; }
    return false;
  });

  // Aggressive focus: everything outside 1-hop goes very dim
  nodeGroup.each(function(n) {
    const circle = d3.select(this).select("circle");
    const label  = d3.select(this).select(".node-label");
    if (connectedIds.has(n.id)) {
      circle.attr("fill-opacity", n.opacity).style("filter", n.id === d.id ? `drop-shadow(0 0 12px ${n.color}aa)` : null);
      label.attr("opacity", 1);
    } else {
      circle.attr("fill-opacity", n.opacity * 0.04).style("filter", null);
      label.attr("opacity", 0);
    }
  });

  if (linkSel) {
    linkSel.attr("stroke-opacity", l => {
      const s = l.source.id ?? l.source;
      const t = l.target.id ?? l.target;
      return (s === d.id || t === d.id) ? 0.9 : 0.02;
    });
  }

  // ── Inspector panel ──
  const inspector = document.getElementById("inspector");
  inspector.classList.add("open");
  document.getElementById("nav-sections").classList.add("dimmed");

  // Type badge
  const typeBadge = document.getElementById("inspector-type-badge");
  typeBadge.textContent = d.type;
  typeBadge.style.color = d.color;
  typeBadge.style.borderColor = d.color + "66";
  typeBadge.style.background  = d.color + "18";

  // Status badges alongside type badge
  const badgesEl = document.getElementById("inspector-badges");
  badgesEl.innerHTML = `<span id="inspector-type-badge" style="color:${d.color};border-color:${d.color}66;background:${d.color}18" class="" id="inspector-type-badge">${d.type}</span>` +
    (d.is_core ? ' <span class="core-badge">★ CORE</span>' : '') +
    (d.zone === "archived" ? ' <span class="archived-badge">ARCHIVED</span>' : '');

  // Full content text
  document.getElementById("inspector-content-text").textContent = d.full;

  // Metadata grid
  const metaItems = [
    ["Zone",        d.zone],
    ["Salience",    d.salience],
    ["Degree",      d.degree],
    ["Activations", d.activation_count],
    ["Created",     d.created_at],
    ...(d.superseded_at ? [["Superseded", d.superseded_at.slice(0,10)]] : []),
    ...(d.tags.length   ? [["Tags",       d.tags.join(", ")]]           : []),
  ];
  document.getElementById("inspector-meta").innerHTML = metaItems.map(([k, v]) =>
    `<div class="meta-item"><span class="meta-key">${k}</span><span class="meta-val">${escapeHtml(String(v))}</span></div>`
  ).join("");

  // Connections
  const connSection = document.getElementById("inspector-connections");
  if (connectedLinks.length) {
    document.getElementById("inspector-conn-title").textContent = `Connections (${connectedLinks.length})`;
    document.getElementById("inspector-conn-list").innerHTML = connectedLinks.map(l => {
      const otherId = (l.source.id ?? l.source) === d.id ? (l.target.id ?? l.target) : (l.source.id ?? l.source);
      const other   = nodeMap.get(otherId);
      const dir     = (l.source.id ?? l.source) === d.id ? "→" : "←";
      if (!other) return "";
      return `<div class="conn-item" onclick="window.highlightById('${other.id}')">
        <div class="conn-dot" style="background:${other.color}"></div>
        <div class="conn-body">
          <span class="conn-edge-type">${dir} ${l.type}</span>
          <span class="conn-label">${escapeHtml(other.label)}</span>
        </div>
      </div>`;
    }).join("");
    connSection.style.display = "block";
  } else {
    connSection.style.display = "none";
  }
}

function clearSelection() {
  if (selectedNode === null) return;
  selectedNode = null;
  if (nodeGroupSel) nodeGroupSel.classed("selected", false);
  if (activeQuery !== null) {
    applyQueryHighlight(activeQuery);
  } else {
    nodeGroupSel.each(function(d) {
      d3.select(this).select("circle").attr("fill-opacity", d.opacity).style("filter", null);
      d3.select(this).select(".node-label").attr("opacity", topLabelIds.has(d.id) ? 0.7 : 0);
    });
    if (linkSel) linkSel.attr("stroke-opacity", d => d.base_opacity);
  }
  document.getElementById("inspector").classList.remove("open");
  document.getElementById("nav-sections").classList.remove("dimmed");
}

// ── Zone toggle ──
document.querySelectorAll(".zone-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const zone = btn.dataset.zone;
    if (activeZones.has(zone)) { activeZones.delete(zone); btn.classList.remove("active"); }
    else                       { activeZones.add(zone);    btn.classList.add("active"); }
    buildGraph();
  });
});

// ── Type legend toggle ──
document.querySelectorAll(".legend-item").forEach(item => {
  item.addEventListener("click", () => {
    const type = item.dataset.type;
    if (hiddenTypes.has(type)) { hiddenTypes.delete(type); item.classList.remove("dimmed"); }
    else                       { hiddenTypes.add(type);    item.classList.add("dimmed"); }
    buildGraph();
  });
});

// ── Search ──
document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    nodeGroupSel.each(function(d) {
      d3.select(this).select("circle").attr("fill-opacity", d.opacity);
      d3.select(this).select(".node-label").attr("opacity", topLabelIds.has(d.id) ? 0.7 : 0);
    });
    return;
  }
  nodeGroupSel.each(function(d) {
    const match = d.full.toLowerCase().includes(q) || d.tags.some(t => t.toLowerCase().includes(q));
    d3.select(this).select("circle").attr("fill-opacity", match ? d.opacity : d.opacity * 0.05);
    d3.select(this).select(".node-label").attr("opacity", match ? 1 : 0);
  });
});

// ── Init ──
buildGraph();
window.addEventListener("resize", buildGraph);

window.highlightById = function(id) {
  const data    = nodeGroupSel.data();
  const nodeMap = new Map(data.map(d => [d.id, d]));
  const d       = nodeMap.get(id);
  if (!d) return;
  selectNode(d, nodeGroupSel, linkSel ? linkSel.data() : [], nodeMap);
};

} // end d3 block
</script>
</body>
</html>
